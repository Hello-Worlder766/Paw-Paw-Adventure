<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Good Dog Adventure! 🐾</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Press Start 2P', monospace;
  overflow: hidden;
  user-select: none;
}
#ui {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 480px;
  max-width: 95vw;
  padding: 8px 4px;
}
#ui span { color: #fff; font-size: 7px; text-shadow: 0 0 5px #000; }
#hearts-ui { color: #ffd700 !important; }

canvas {
  display: block;
  border: 4px solid #4a90d9;
  background: #222;
  image-rendering: pixelated;
  touch-action: none;
  max-width: 95vw;
}
#controls { display: flex; gap: 12px; margin-top: 12px; z-index: 2; }
.btn {
  background: #333;
  border: 2px solid #4a90d9;
  color: white;
  padding: 15px 25px;
  border-radius: 8px;
  font-family: 'Press Start 2P';
  cursor: pointer;
}
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  text-align: center;
  padding: 20px;
}
#overlay h1 { color: #4a90d9; font-size: 18px; margin-bottom: 15px; }
#overlay p { color: #ccc; font-size: 9px; line-height: 1.6; margin-bottom: 20px; white-space: pre-line; }
.color-select { display: flex; gap: 10px; margin-bottom: 20px; }
.color-opt { 
    width: 40px; height: 40px; border: 3px solid #fff; cursor: pointer; border-radius: 5px;
}
.active-opt { border-color: #4a90d9; transform: scale(1.1); }
#start-btn {
  background: #4a90d9; border: none; color: white;
  padding: 15px 30px; font-family: 'Press Start 2P'; cursor: pointer;
}
#power-indicator { color: #ff4d4d; font-size: 8px; margin-top: 5px; height: 10px;}
</style>
</head>
<body>

<div id="ui">
  <span id="level-ui">LEVEL 1</span>
  <span id="hearts-ui">🦴 0/5</span>
  <span id="lives-ui">LIVES: 3</span>
</div>

<canvas id="game" width="480" height="320"></canvas>
<div id="power-indicator"></div>

<div id="controls">
  <button class="btn" id="btn-left">◀</button>
  <button class="btn" id="btn-jump">▲</button>
  <button class="btn" id="btn-right">▶</button>
</div>

<div id="overlay">
  <h1 id="ov-title">🐾 Good Dog! 🐾</h1>
  <p id="ov-msg">The scary Vacuums are awake! 
    Collect Bones 🦴 and Steaks 🥩 
    to reach the Dog Bed!</p>
  
  <div class="color-select">
    <div class="color-opt active-opt" data-idx="0" style="background:#edc9af"></div>
    <div class="color-opt" data-idx="1" style="background:#333"></div>
    <div class="color-opt" data-idx="2" style="background:#ddd"></div>
  </div>

  <button id="start-btn">START PLAYING</button>
</div>

<script>
window.onload = function() {
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = 480, H = 320;

    const DOG_PALETTES = [
        { main: '#edc9af', spot: '#d2b48c' }, 
        { main: '#333333', spot: '#000000' }, 
        { main: '#dddddd', spot: '#777777' }  
    ];
    let selectedDog = 0;
    let gameActive = false;
    let curLvl = 0, score = 0, lives = 3, power = 0, barkTimer = 0;
    let player = { x:30, y:200, vx:0, vy:0, ground:false, dir:1 };
    let vacs = [], bones = [], steaks = [];
    
    let jumpLocked = false; 
    const keys = { left: false, right: false, jump: false };

    const LEVELS = [
      {
        bg: '#2c3e50',
        platforms: [{x:0, y:288, w:480, h:32}, {x:100, y:220, w:100, h:15}, {x:280, y:180, w:100, h:15}, {x:50, y:140, w:80, h:15}],
        bones: [{x:120, y:200}, {x:300, y:160}, {x:70, y:120}, {x:400, y:260}, {x:200, y:260}],
        steaks: [{x:330, y:260}],
        vacuums: [{x:250, y:260, range: 100, speed: 1.5, dir: 1}],
        bed: {x:420, y:288},
        goal: 5
      },
      {
        bg: '#1a1a2e',
        platforms: [{x:0, y:288, w:150, h:32}, {x:200, y:240, w:100, h:15}, {x:350, y:288, w:130, h:32}, {x:100, y:160, w:80, h:15}, {x:250, y:120, w:100, h:15}],
        bones: [{x:30, y:260}, {x:220, y:220}, {x:380, y:260}, {x:120, y:140}, {x:270, y:100}, {x:440, y:260}],
        steaks: [{x:400, y:180}],
        vacuums: [{x:80, y:250, range: 50, speed: 2, dir: 1}, {x:380, y:250, range: 40, speed: 2, dir: -1}],
        bed: {x:420, y:288},
        goal: 6
      },
      {
        bg: '#34495e',
        platforms: [{x:0, y:288, w:480, h:32}, {x:50, y:220, w:60, h:15}, {x:150, y:170, w:60, h:15}, {x:250, y:120, w:100, h:15}, {x:380, y:180, w:80, h:15}],
        bones: [{x:20, y:260}, {x:80, y:190}, {x:180, y:140}, {x:300, y:90}, {x:420, y:150}, {x:450, y:260}],
        steaks: [{x:280, y:260}],
        vacuums: [{x:100, y:250, range: 60, speed: 2.2, dir: 1}, {x:300, y:250, range: 80, speed: 1.8, dir: -1}, {x:250, y:90, range: 40, speed: 3, dir: 1}],
        bed: {x:420, y:288},
        goal: 6
      }
    ];

    function init(lvlIdx) {
        const L = LEVELS[lvlIdx];
        score = 0; power = 0; barkTimer = 0;
        player = { x:30, y:200, vx:0, vy:0, ground:false, dir:1 };
        bones = L.bones.map(b => ({...b, collected:false}));
        steaks = L.steaks.map(s => ({...s, collected:false}));
        vacs = L.vacuums.map(v => ({...v, startX:v.x}));
        updateUI();
    }

    function updateUI() {
        document.getElementById('hearts-ui').textContent = `🦴 ${score}/${LEVELS[curLvl].goal}`;
        document.getElementById('level-ui').textContent = `LEVEL ${curLvl + 1}`;
        document.getElementById('lives-ui').textContent = `LIVES: ${lives}`;
    }

    function drawDog(x, y, dir, pwr) {
        const c = DOG_PALETTES[selectedDog];
        const wag = Math.sin(Date.now() / 50) * 3; 
        ctx.save();
        ctx.translate(x, y);
        if(dir < 0) { ctx.translate(28, 0); ctx.scale(-1, 1); }
        if(pwr > 0) { ctx.shadowBlur = 15; ctx.shadowColor = '#ff4d4d'; }
        ctx.fillStyle = c.main;
        ctx.save();
        ctx.translate(2, 12);
        ctx.rotate(wag * Math.PI / 180);
        ctx.fillRect(-6, -2, 6, 4);
        ctx.restore();
        ctx.fillRect(4, 22, 5, 6); ctx.fillRect(16, 22, 5, 6);
        ctx.fillRect(2, 10, 22, 14); 
        ctx.fillRect(18, 6, 8, 8);
        ctx.fillRect(20, 2, 12, 10); 
        ctx.fillRect(28, 6, 8, 6);   
        ctx.fillStyle = '#000';
        ctx.fillRect(34, 6, 3, 3);
        ctx.fillStyle = c.spot;
        ctx.fillRect(20, 4, 4, 10); 
        ctx.fillStyle = '#000';
        ctx.fillRect(25, 5, 2, 2);
        if(barkTimer > 0) {
            ctx.fillStyle = "white";
            ctx.font = "8px 'Press Start 2P'";
            ctx.fillText("BARK!", 15, -10);
            barkTimer--;
        }
        ctx.restore();
    }

    function drawVacuum(v) {
        ctx.fillStyle = '#444';
        ctx.fillRect(v.x - 15, v.y + 10, 30, 12);
        ctx.fillStyle = '#222';
        ctx.fillRect(v.x - 2, v.y - 5, 4, 15);
        ctx.fillStyle = '#ff0000';
        if(Math.floor(Date.now()/150) % 2) ctx.fillRect(v.x + 8, v.y + 12, 4, 4);
    }

    function drawBone(x, y) {
        ctx.fillStyle = '#fff';
        ctx.fillRect(x-6, y-2, 12, 4);
        ctx.fillRect(x-8, y-4, 4, 4); ctx.fillRect(x-8, y+0, 4, 4);
        ctx.fillRect(x+4, y-4, 4, 4); ctx.fillRect(x+4, y+0, 4, 4);
    }

    function drawSteak(x, y) {
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = '#a22'; 
        ctx.beginPath();
        ctx.moveTo(-12, -8); ctx.lineTo(10, -10); ctx.lineTo(14, 6); ctx.lineTo(-10, 10);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#eee'; 
        ctx.fillRect(-2, -6, 4, 14); ctx.fillRect(-6, -6, 12, 4); 
        ctx.restore();
    }

    function drawBed(x, y) {
        ctx.fillStyle = '#4a90d9';
        ctx.beginPath(); ctx.ellipse(x, y+10, 35, 12, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffdbac'; ctx.fillRect(x-6, y-12, 12, 12);
        ctx.fillStyle = '#333'; ctx.fillRect(x-6, y-14, 12, 4);
    }

    function update() {
        if(!gameActive) return;

        if (keys.left) { player.vx = -3.2; player.dir = -1; }
        else if (keys.right) { player.vx = 3.2; player.dir = 1; }
        else { player.vx = 0; }

        if (keys.jump && player.ground && !jumpLocked) {
            player.vy = -10;
            player.ground = false;
            jumpLocked = true; 
            barkTimer = 20;
        }

        player.vy += 0.5; 
        player.x += player.vx;
        player.y += player.vy;
        player.ground = false;

        const L = LEVELS[curLvl];
        L.platforms.forEach(p => {
            if(player.x+25 > p.x && player.x < p.x+p.w && player.y+28 > p.y && player.y+28 < p.y+p.h) {
                if(player.vy > 0) { player.y = p.y - 28; player.vy = 0; player.ground = true; }
            }
        });

        if(player.x < 0) player.x = 0;
        if(player.x > W-30) player.x = W-30;
        if(player.y > H) { lives--; if(lives<=0) showGameOver(); else init(curLvl); }

        bones.forEach(b => {
            if(!b.collected && Math.hypot(player.x-b.x, player.y-b.y) < 25) { b.collected = true; score++; updateUI(); }
        });
        steaks.forEach(s => {
            if(!s.collected && Math.hypot(player.x-s.x, player.y-s.y) < 25) { s.collected = true; power = 300; }
        });

        if(power > 0) power--;

        vacs.forEach(v => {
            v.x += v.dir * v.speed;
            if(Math.abs(v.x - v.startX) > v.range) v.dir *= -1;
            if(power <= 0 && Math.hypot(player.x+15-v.x, player.y+15-v.y) < 22) { lives--; if(lives<=0) showGameOver(); else init(curLvl); }
        });

        if(score >= L.goal && Math.hypot(player.x - L.bed.x, player.y - L.bed.y) < 40) win();
    }

    function showOverlay(title, msg, btnText, hideColors = false) {
        gameActive = false;
        const ov = document.getElementById('overlay');
        ov.style.display = 'flex';
        document.getElementById('ov-title').textContent = title;
        document.getElementById('ov-msg').textContent = msg;
        document.getElementById('start-btn').textContent = btnText;
        document.querySelector('.color-select').style.display = hideColors ? 'none' : 'flex';
    }

    function showGameOver() {
        lives = 3; curLvl = 0;
        showOverlay("GAME OVER", "The vacuums won!", "RETRY", false);
    }

    function win() {
        if(curLvl < LEVELS.length - 1) {
            curLvl++;
            showOverlay("LEVEL CLEAR!", "Back to the bed!", "NEXT LEVEL", true);
        } else {
            curLvl = 0; lives = 3;
            showOverlay("DOG CHAMPION!", "You found your human!", "PLAY AGAIN", false);
        }
    }

    function loop() {
        ctx.fillStyle = LEVELS[curLvl].bg;
        ctx.fillRect(0,0,W,H);
        LEVELS[curLvl].platforms.forEach(p => {
            ctx.fillStyle = '#444'; ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = '#666'; ctx.fillRect(p.x, p.y, p.w, 4);
        });
        drawBed(LEVELS[curLvl].bed.x, LEVELS[curLvl].bed.y);
        bones.forEach(b => { if(!b.collected) drawBone(b.x, b.y); });
        steaks.forEach(s => { if(!s.collected) drawSteak(s.x, s.y); });
        vacs.forEach(drawVacuum);
        drawDog(player.x, player.y, player.dir, power);
        update();
        requestAnimationFrame(loop);
    }

    document.getElementById('start-btn').addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById('overlay').style.display = 'none';
        init(curLvl);
        gameActive = true;
    });

    document.querySelectorAll('.color-opt').forEach(opt => {
        opt.addEventListener('click', function() {
            document.querySelectorAll('.color-opt').forEach(o => o.classList.remove('active-opt'));
            this.classList.add('active-opt');
            selectedDog = parseInt(this.getAttribute('data-idx'));
        });
    });

    const bindBtn = (id, key) => {
        const el = document.getElementById(id);
        el.addEventListener('mousedown', (e) => { e.preventDefault(); keys[key] = true; });
        el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
        el.addEventListener('mouseup', (e) => { e.preventDefault(); keys[key] = false; if(key === 'jump') jumpLocked = false; });
        el.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; if(key === 'jump') jumpLocked = false; });
    };
    bindBtn('btn-left', 'left');
    bindBtn('btn-right', 'right');
    bindBtn('btn-jump', 'jump');

    window.addEventListener('keydown', e => {
        if(e.repeat) return;
        if(e.code === 'ArrowLeft') keys.left = true;
        if(e.code === 'ArrowRight') keys.right = true;
        if(e.code === 'ArrowUp' || e.code === 'Space') keys.jump = true;
    });
    window.addEventListener('keyup', e => {
        if(e.code === 'ArrowLeft') keys.left = false;
        if(e.code === 'ArrowRight') keys.right = false;
        if(e.code === 'ArrowUp' || e.code === 'Space') { keys.jump = false; jumpLocked = false; }
    });

    loop();
};
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>{{PET_NAME}}'s Big Adventure!</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: #1a0d00;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: 100vh;
  min-height: 100dvh;
  font-family: 'Press Start 2P', monospace;
  overflow-x: hidden;
  overflow-y: auto;
  user-select: none;
  -webkit-user-select: none;
  padding: 4px 0 8px 0;
}

#ui {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: min(480px, 95vw);
  padding: 8px 4px;
}

#ui span {
  color: #ffcc80;
  font-size: 7px;
  text-shadow: 0 0 8px #ff8c00;
}

#treats-ui { color: #ff8c00 !important; font-size: 9px !important; }

canvas {
  display: block;
  border: 3px solid #ff8c00;
  box-shadow: 0 0 30px #ff8c0060, 0 0 60px #a0520020;
  image-rendering: pixelated;
  touch-action: none;
  position: relative;
  z-index: 2;
  width: min(480px, 95vw);
  height: auto;
}

#controls {
  display: flex;
  gap: 12px;
  margin-top: 12px;
  z-index: 2;
  position: relative;
}

.btn {
  background: #3d1f00;
  border: 2px solid #ff8c00;
  color: #ffcc80;
  font-family: 'Press Start 2P', monospace;
  font-size: 16px;
  padding: 14px 20px;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 0 10px #ff8c0030;
  touch-action: manipulation;
}
.btn:active { background: #5d3000; transform: scale(0.95); }

#overlay {
  position: fixed;
  top:0; left:0; width:100%; height:100%;
  background: #1a0d00ee;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  gap: 12px;
  padding: 20px;
  overflow-y: auto;
}

#overlay h1 {
  color: #ff8c00;
  font-size: clamp(10px, 3.5vw, 18px);
  text-align: center;
  text-shadow: 0 0 20px #ff8c00;
  line-height: 2;
}

#overlay p {
  color: #ffcc80;
  font-size: clamp(7px, 2.5vw, 10px);
  text-align: center;
  line-height: 2.2;
  max-width: 360px;
  padding: 0 10px;
  white-space: pre-line;
}

#overlay button {
  background: #ff8c00;
  border: none;
  color: white;
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(8px, 2.5vw, 11px);
  padding: 14px 28px;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 0 20px #ff8c0060;
  margin-top: 6px;
}
#overlay button:hover { background: #e67600; }

#power-indicator {
  position: relative;
  z-index: 2;
  color: #ffe066;
  font-size: 7px;
  height: 16px;
  text-shadow: 0 0 8px #ffe066;
}

#pet-selector {
  display: flex;
  gap: 16px;
  margin: 4px 0;
}
.pet-btn {
  background: #3d1f00;
  border: 2px solid #ff8c00;
  color: #ffcc80;
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(8px, 2.5vw, 10px);
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
  opacity: 0.6;
}
.pet-btn.selected {
  background: #ff8c00;
  color: #fff;
  opacity: 1;
  box-shadow: 0 0 12px #ff8c0080;
}
</style>
</head>
<body>

<canvas id="stars-bg" style="position:fixed;top:0;left:0;z-index:0;pointer-events:none;"></canvas>

<div id="ui">
  <span id="level-ui">LEVEL 1</span>
  <span id="treats-ui">TREATS: 0/5</span>
  <span id="lives-ui">LIVES: 3</span>
</div>

<canvas id="game" width="480" height="320"></canvas>
<div id="power-indicator"></div>

<div id="controls">
  <button class="btn" id="btn-left">&lt;</button>
  <button class="btn" id="btn-jump">^</button>
  <button class="btn" id="btn-right">&gt;</button>
</div>

<div id="overlay">
  <h1>{{PET_NAME}}'s Big Adventure!</h1>
  <div id="pet-selector">
    <button class="pet-btn selected" id="pick-dog" onclick="selectPet('dog')">DOG</button>
    <button class="pet-btn" id="pick-cat" onclick="selectPet('cat')">CAT</button>
  </div>
  <p>{{PET_NAME}} is on the loose!

Collect all the treats to find the cozy pet bed!

Watch out for the vacuum cleaner!

Arrow keys or buttons to move.</p>
  <button id="start-btn">START ADVENTURE</button>
</div>

<script>
const PET_NAME = '{{PET_NAME}}'
const OWNER_MESSAGE = '{{OWNER_MESSAGE}}'

// ---- STAR BACKGROUND ----
const starCanvas = document.getElementById('stars-bg')
const starCtx = starCanvas.getContext('2d')
function resizeStars(){
  starCanvas.width = window.innerWidth
  starCanvas.height = window.innerHeight
}
resizeStars()
window.addEventListener('resize', resizeStars)
const stars = Array.from({length:60}, ()=>({
  x: Math.random()*window.innerWidth,
  y: Math.random()*window.innerHeight,
  r: Math.random()*1.5+0.3,
  a: Math.random(),
  speed: Math.random()*0.008+0.003
}))
function drawStars(){
  starCtx.clearRect(0,0,starCanvas.width,starCanvas.height)
  stars.forEach(s=>{
    s.a += s.speed
    const alpha = 0.2 + 0.5*Math.abs(Math.sin(s.a))
    starCtx.beginPath()
    starCtx.arc(s.x, s.y, s.r, 0, Math.PI*2)
    starCtx.fillStyle = `rgba(255,200,120,${alpha})`
    starCtx.fill()
  })
  requestAnimationFrame(drawStars)
}
drawStars()

// ---- GAME ----
const canvas = document.getElementById('game')
const ctx = canvas.getContext('2d')
const W = 480, H = 320
const GRAVITY = 0.55
const JUMP_FORCE = -12
const SPEED = 3.5

let petType = 'dog'

function selectPet(type){
  petType = type
  document.getElementById('pick-dog').classList.toggle('selected', type==='dog')
  document.getElementById('pick-cat').classList.toggle('selected', type==='cat')
}

const C = {
  dogBody:'#c8860a', dogBelly:'#f5c842', dogEar:'#8b5e0a', dogNose:'#2d1a00',
  catBody:'#888888', catBelly:'#cccccc', catEar:'#555555', catNose:'#ff9999',
  platform:'#7a4a1a', platformTop:'#c87830',
  bone:'#f5f0e0', boneGlow:'#ffe08080',
  fish:'#88ccff', fishGlow:'#88ccff80',
  toy:'#ff6644',
  bedBase:'#8b4513', bedPillow:'#ff8c6b',
  vacBody:'#444466', vacDetail:'#6666aa',
  particle:'#ff8c00'
}

const LEVELS = [
  {
    bg1:'#2d1800', bg2:'#1a0d00',
    platforms:[
      {x:0,   y:288, w:480, h:32},
      {x:80,  y:224, w:96,  h:16},
      {x:240, y:192, w:96,  h:16},
      {x:360, y:240, w:80,  h:16},
      {x:150, y:160, w:64,  h:16},
    ],
    treats:[{x:100,y:200},{x:260,y:168},{x:375,y:216},{x:170,y:136},{x:420,y:200}],
    toys:[{x:310,y:160}],
    vacuums:[
      {x:200,y:256,dir:1,range:120,speed:1.2},
      {x:360,y:208,dir:-1,range:80,speed:1.5},
    ],
    bed:{x:420,y:240},
    totalTreats:5
  },
  {
    bg1:'#1a1000', bg2:'#0d0800',
    platforms:[
      {x:0,   y:288, w:160, h:32},
      {x:200, y:288, w:120, h:32},
      {x:360, y:288, w:120, h:32},
      {x:64,  y:224, w:80,  h:16},
      {x:200, y:208, w:80,  h:16},
      {x:320, y:192, w:80,  h:16},
      {x:128, y:160, w:64,  h:16},
      {x:280, y:144, w:64,  h:16},
      {x:400, y:224, w:64,  h:16},
    ],
    treats:[{x:80,y:200},{x:210,y:184},{x:330,y:168},{x:145,y:136},{x:295,y:120},{x:410,y:200}],
    toys:[{x:240,y:260},{x:420,y:260}],
    vacuums:[
      {x:100,y:256,dir:1,range:100,speed:1.4},
      {x:220,y:256,dir:-1,range:80,speed:1.6},
      {x:200,y:176,dir:1,range:60,speed:1.8},
    ],
    bed:{x:430,y:240},
    totalTreats:6
  },
  {
    bg1:'#0d1500', bg2:'#060d00',
    platforms:[
      {x:0,   y:288, w:96,  h:32},
      {x:160, y:288, w:80,  h:32},
      {x:320, y:288, w:160, h:32},
      {x:48,  y:240, w:64,  h:16},
      {x:160, y:224, w:64,  h:16},
      {x:256, y:208, w:64,  h:16},
      {x:352, y:224, w:64,  h:16},
      {x:96,  y:176, w:64,  h:16},
      {x:224, y:160, w:64,  h:16},
      {x:352, y:160, w:64,  h:16},
      {x:160, y:112, w:64,  h:16},
      {x:288, y:96,  w:96,  h:16},
    ],
    treats:[
      {x:64,y:216},{x:170,y:200},{x:265,y:184},{x:362,y:200},
      {x:108,y:152},{x:232,y:136},{x:360,y:136},{x:175,y:88}
    ],
    toys:[{x:310,y:64},{x:60,y:208}],
    vacuums:[
      {x:180,y:256,dir:1,range:80,speed:1.5},
      {x:320,y:256,dir:-1,range:80,speed:1.7},
      {x:220,y:192,dir:1,range:80,speed:2.0},
      {x:290,y:128,dir:-1,range:80,speed:2.0},
    ],
    bed:{x:355,y:56},
    totalTreats:8
  }
]

let level=0, treatsCollected=0, lives=3, gameRunning=false, won=false
let powerTimer=0, particles=[], bedOpen=false, winTimer=0
const keys={left:false,right:false,jump:false}
let player={}, vacuums=[], treats=[], toys=[], platforms=[], bed={}

function initLevel(lvl){
  const L=LEVELS[lvl]
  treatsCollected=0; bedOpen=false; powerTimer=0; particles=[]
  platforms=JSON.parse(JSON.stringify(L.platforms))
  treats=JSON.parse(JSON.stringify(L.treats)).map(h=>({...h,collected:false}))
  toys=JSON.parse(JSON.stringify(L.toys)).map(t=>({...t,collected:false}))
  vacuums=JSON.parse(JSON.stringify(L.vacuums)).map(g=>({...g,startX:g.x,phase:Math.random()*Math.PI*2}))
  bed={...L.bed}
  player={x:40,y:220,vx:0,vy:0,onGround:false,facing:1,jumpPressed:false,dead:false,deadTimer:0}
  updateUI()
}

function updateUI(){
  document.getElementById('treats-ui').textContent=`TREATS: ${treatsCollected}/${LEVELS[level].totalTreats}`
  document.getElementById('level-ui').textContent=`LEVEL ${level+1}`
  document.getElementById('lives-ui').textContent=`LIVES: ${lives}`
  const pi=document.getElementById('power-indicator')
  if(pi) pi.textContent=powerTimer>0?`TURBO! ${Math.ceil(powerTimer/60)}s`:''
}

function spawnParticles(x,y,color,n=8){
  for(let i=0;i<n;i++){
    const angle=(Math.PI*2/n)*i
    particles.push({x,y,vx:Math.cos(angle)*2.5*(0.5+Math.random()),vy:Math.sin(angle)*2.5*(0.5+Math.random()),life:40+Math.random()*20,maxLife:60,color,r:3+Math.random()*3})
  }
}

function rectOverlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by
}

function update(){
  if(!gameRunning||won) return
  if(player.dead){
    player.deadTimer--
    if(player.deadTimer<=0){
      if(lives<=0){
        showOverlay('OH NO!',`${PET_NAME} got scared!\n\nTry again!`,'TRY AGAIN',()=>{lives=3;initLevel(level);gameRunning=true})
      } else { initLevel(level) }
    }
    return
  }

  let dx=0
  if(keys.left) dx=-SPEED
  if(keys.right) dx=SPEED
  player.vx=dx
  if(dx>0) player.facing=1
  if(dx<0) player.facing=-1

  if(keys.jump&&player.onGround&&!player.jumpPressed){
    player.vy=JUMP_FORCE;player.jumpPressed=true;player.onGround=false
  }
  if(!keys.jump) player.jumpPressed=false

  player.vy+=GRAVITY
  player.x+=player.vx
  player.y+=player.vy
  player.onGround=false

  platforms.forEach(p=>{
    if(rectOverlap(player.x,player.y,22,24,p.x,p.y,p.w,p.h)){
      if(player.vy>=0&&player.y+24-player.vy<=p.y+2){
        player.y=p.y-24;player.vy=0;player.onGround=true
      } else if(player.vy<0&&player.y-player.vy>=p.y+p.h-2){
        player.y=p.y+p.h;player.vy=0
      } else {
        if(player.vx>0) player.x=p.x-22
        if(player.vx<0) player.x=p.x+p.w
      }
    }
  })

  if(player.x<0) player.x=0
  if(player.x>W-22) player.x=W-22

  if(player.y>H+40&&!player.dead){
    lives--;player.dead=true;player.deadTimer=60
    spawnParticles(player.x+11,H,'#ff8c00',12)
  }

  treats.forEach(t=>{
    if(!t.collected&&rectOverlap(player.x,player.y,22,24,t.x-10,t.y-10,20,20)){
      t.collected=true;treatsCollected++
      spawnParticles(t.x,t.y,petType==='dog'?'#f5f0e0':'#88ccff',10)
      if(treatsCollected>=LEVELS[level].totalTreats) bedOpen=true
      updateUI()
    }
  })

  toys.forEach(t=>{
    if(!t.collected&&rectOverlap(player.x,player.y,22,24,t.x-12,t.y-12,24,24)){
      t.collected=true;powerTimer=300
      spawnParticles(t.x,t.y,'#ff6644',12)
      updateUI()
    }
  })

  if(powerTimer>0){ powerTimer--; if(powerTimer%60===0) updateUI() }

  vacuums.forEach(v=>{
    v.phase+=0.04
    v.x+=v.dir*v.speed
    if(v.x>v.startX+v.range||v.x<v.startX-v.range) v.dir*=-1
    if(!player.dead&&powerTimer<=0&&rectOverlap(player.x,player.y,22,24,v.x-16,v.y-16,32,24)){
      lives--;player.dead=true;player.deadTimer=80
      spawnParticles(player.x+11,player.y,'#6666aa',12)
      updateUI()
    }
  })

  if(bedOpen&&rectOverlap(player.x,player.y,22,24,bed.x-18,bed.y-20,40,36)){
    winTimer++
    if(winTimer>30){
      won=true
      if(level<LEVELS.length-1){
        showOverlay(`LEVEL ${level+1} CLEAR!`,`${PET_NAME} is doing amazing!\n\nKeep going!`,'NEXT LEVEL',()=>{
          level++;initLevel(level);gameRunning=true;won=false;winTimer=0
        })
      } else {
        const msg=OWNER_MESSAGE||`${PET_NAME} found the cozy bed!\n\nTime for a nap!`
        showOverlay('YOU DID IT!',msg,'PLAY AGAIN',()=>{
          level=0;lives=3;initLevel(level);gameRunning=true;won=false;winTimer=0
        })
      }
    }
  } else { winTimer=0 }

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--})
  particles=particles.filter(p=>p.life>0)
}

// ---- DRAWING ----
function drawDog(x,y,facing,powered){
  ctx.save(); ctx.translate(x+11,y+12)
  if(facing<0) ctx.scale(-1,1)
  if(powered){ctx.shadowColor='#ffe066';ctx.shadowBlur=14}
  ctx.fillStyle=C.dogBody; ctx.fillRect(-9,-4,18,14)
  ctx.fillStyle=C.dogBelly; ctx.fillRect(-6,2,12,8)
  ctx.fillStyle=C.dogBody; ctx.fillRect(-8,-16,16,14)
  ctx.fillStyle=C.dogBelly; ctx.fillRect(2,-10,8,6)
  ctx.fillStyle=C.dogNose; ctx.fillRect(6,-10,4,3)
  ctx.fillStyle=C.dogNose; ctx.fillRect(-4,-14,3,3); ctx.fillRect(3,-14,3,3)
  ctx.fillStyle=C.dogEar; ctx.fillRect(-10,-18,6,10); ctx.fillRect(4,-18,6,8)
  ctx.fillStyle=C.dogBody; ctx.fillRect(9,-8,5,4); ctx.fillRect(12,-12,4,6)
  ctx.fillStyle=C.dogBody; ctx.fillRect(-7,10,5,8); ctx.fillRect(2,10,5,8)
  ctx.fillStyle=C.dogBelly; ctx.fillRect(-8,16,6,3); ctx.fillRect(1,16,6,3)
  ctx.restore()
}

function drawCat(x,y,facing,powered){
  ctx.save(); ctx.translate(x+11,y+12)
  if(facing<0) ctx.scale(-1,1)
  if(powered){ctx.shadowColor='#ffe066';ctx.shadowBlur=14}
  ctx.fillStyle=C.catBody; ctx.fillRect(-8,-4,16,14)
  ctx.fillStyle=C.catBelly; ctx.fillRect(-5,0,10,10)
  ctx.fillStyle=C.catBody; ctx.fillRect(-8,-18,16,14)
  ctx.fillStyle=C.catEar; ctx.fillRect(-9,-24,6,8); ctx.fillRect(3,-24,6,8)
  ctx.fillStyle=C.catNose; ctx.fillRect(-7,-22,3,5); ctx.fillRect(4,-22,3,5)
  ctx.fillStyle='#2d1a00'; ctx.fillRect(-5,-14,4,3); ctx.fillRect(1,-14,4,3)
  ctx.fillStyle='#000'; ctx.fillRect(-4,-14,2,3); ctx.fillRect(2,-14,2,3)
  ctx.fillStyle=C.catNose; ctx.fillRect(-1,-9,3,2)
  ctx.fillStyle='#888'; ctx.fillRect(-12,-9,8,1); ctx.fillRect(4,-9,8,1)
  ctx.fillStyle=C.catBody; ctx.fillRect(8,-2,4,12); ctx.fillRect(10,-6,4,6)
  ctx.fillStyle=C.catBody; ctx.fillRect(-6,10,4,8); ctx.fillRect(2,10,4,8)
  ctx.fillStyle=C.catBelly; ctx.fillRect(-7,16,5,3); ctx.fillRect(1,16,5,3)
  ctx.restore()
}

function drawVacuum(v){
  ctx.save(); ctx.translate(v.x,v.y)
  if(v.dir>0) ctx.scale(-1,1)
  ctx.fillStyle=C.vacBody; ctx.fillRect(-16,-14,32,20)
  ctx.fillStyle=C.vacDetail
  ctx.beginPath(); ctx.arc(0,-14,10,Math.PI,0); ctx.fill()
  ctx.fillStyle='#333355'; ctx.fillRect(12,-6,10,6); ctx.fillRect(20,-10,4,12)
  ctx.fillStyle='#ff4444'; ctx.fillRect(-8,-12,5,4); ctx.fillRect(3,-12,5,4)
  ctx.fillStyle='#222'; ctx.fillRect(-12,6,8,6); ctx.fillRect(4,6,8,6)
  ctx.fillStyle=powerTimer>0?'#00ff00':'#ff2200'; ctx.fillRect(-2,-8,4,4)
  ctx.restore()
}

function drawTreat(x,y,t){
  const bob=Math.sin(t*0.05)*3
  ctx.save(); ctx.translate(x,y+bob)
  if(petType==='dog'){
    ctx.fillStyle=C.bone; ctx.shadowColor=C.boneGlow; ctx.shadowBlur=8
    ctx.fillRect(-6,-2,12,4); ctx.fillRect(-8,-4,5,8); ctx.fillRect(3,-4,5,8)
  } else {
    ctx.fillStyle=C.fish; ctx.shadowColor=C.fishGlow; ctx.shadowBlur=8
    ctx.fillRect(-8,-3,14,6); ctx.fillRect(5,-5,5,10); ctx.fillRect(-10,-2,4,4)
    ctx.fillStyle='#2255aa'; ctx.fillRect(-5,-1,2,2)
  }
  ctx.restore()
}

function drawToy(x,y,t){
  const bob=Math.sin(t*0.07+1)*3
  ctx.save(); ctx.translate(x,y+bob)
  ctx.shadowColor=C.toy; ctx.shadowBlur=12
  if(petType==='dog'){
    ctx.fillStyle='#ff4444'
    ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill()
    ctx.fillStyle='#ff8888'; ctx.fillRect(-3,-8,6,4)
  } else {
    ctx.fillStyle='#cc8844'; ctx.fillRect(-8,-4,16,10); ctx.fillRect(-4,-8,8,6); ctx.fillRect(6,-2,6,2)
    ctx.fillStyle='#ff9999'; ctx.fillRect(-6,-6,3,3); ctx.fillRect(3,-6,3,3)
  }
  ctx.restore()
}

function drawBed(x,y,open){
  ctx.save(); ctx.translate(x,y)
  ctx.fillStyle=C.bedBase; ctx.fillRect(-18,-8,40,12)
  ctx.fillStyle=open?'#ffaa88':C.bedPillow; ctx.fillRect(-14,-18,32,12)
  ctx.fillStyle='#cc6644'; ctx.fillRect(-16,-6,36,8)
  if(open){
    ctx.fillStyle='#ffe066'; ctx.font='6px monospace'
    ctx.fillText('z',8,-22); ctx.fillText('zz',14,-28)
  }
  ctx.restore()
}

function drawPlatform(p){
  ctx.fillStyle=C.platform; ctx.fillRect(p.x,p.y+2,p.w,p.h-2)
  ctx.fillStyle=C.platformTop; ctx.fillRect(p.x,p.y,p.w,4)
  ctx.fillStyle='#c8783080'
  for(let i=4;i<p.w-4;i+=12) ctx.fillRect(p.x+i,p.y+6,4,2)
}

let tick=0
function draw(){
  const L=LEVELS[level]
  const grad=ctx.createLinearGradient(0,0,0,H)
  grad.addColorStop(0,L.bg1); grad.addColorStop(1,L.bg2)
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H)
  platforms.forEach(drawPlatform)
  treats.forEach(t=>{if(!t.collected) drawTreat(t.x,t.y,tick)})
  toys.forEach(t=>{if(!t.collected) drawToy(t.x,t.y,tick)})
  drawBed(bed.x,bed.y,bedOpen)
  vacuums.forEach(drawVacuum)
  if(!player.dead){
    if(petType==='dog') drawDog(player.x,player.y,player.facing,powerTimer>0)
    else drawCat(player.x,player.y,player.facing,powerTimer>0)
  }
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life/p.maxLife
    ctx.fillStyle=p.color
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill()
    ctx.restore()
  })
  if(bedOpen&&!won){ctx.fillStyle='#ff8c0015';ctx.fillRect(0,0,W,H)}
  tick++
}

function loop(){ update(); draw(); requestAnimationFrame(loop) }

function showOverlay(title,msg,btnText,cb){
  const ov=document.getElementById('overlay')
  ov.querySelector('h1').textContent=title
  ov.querySelector('p').textContent=msg
  document.getElementById('pet-selector').style.display='none'
  const btn=ov.querySelector('button')
  btn.textContent=btnText
  btn.onclick=()=>{ov.style.display='none';cb()}
  ov.style.display='flex'
}

document.getElementById('start-btn').onclick=()=>{
  document.getElementById('overlay').style.display='none'
  initLevel(level); gameRunning=true
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a') keys.left=true
  if(e.key==='ArrowRight'||e.key==='d') keys.right=true
  if(e.key==='ArrowUp'||e.key===' '||e.key==='w') keys.jump=true
})
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a') keys.left=false
  if(e.key==='ArrowRight'||e.key==='d') keys.right=false
  if(e.key==='ArrowUp'||e.key===' '||e.key==='w') keys.jump=false
})

function holdBtn(id,key){
  const btn=document.getElementById(id)
  btn.addEventListener('touchstart',e=>{e.preventDefault();keys[key]=true},{passive:false})
  btn.addEventListener('touchend',  e=>{e.preventDefault();keys[key]=false},{passive:false})
  btn.addEventListener('touchcancel',e=>{e.preventDefault();keys[key]=false},{passive:false})
  btn.addEventListener('mousedown', e=>{e.preventDefault();keys[key]=true})
  btn.addEventListener('mouseup',   ()=>keys[key]=false)
  btn.addEventListener('mouseleave',()=>keys[key]=false)
}

holdBtn('btn-left','left')
holdBtn('btn-right','right')
holdBtn('btn-jump','jump')
window.addEventListener('blur',()=>{keys.left=false;keys.right=false;keys.jump=false})

let lastTouch=0
document.addEventListener('touchend',e=>{
  const now=Date.now()
  if(now-lastTouch<300) e.preventDefault()
  lastTouch=now
},{passive:false})

loop()
</script>
</body>

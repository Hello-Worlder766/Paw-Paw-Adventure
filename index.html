<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 480, H = 320;

// Dog Colors
const DOG_PALETTES = [
    { main: '#edc9af', spot: '#d2b48c', name: 'Golden' },
    { main: '#333333', spot: '#000000', name: 'Black' },
    { main: '#dddddd', spot: '#4a90d9', name: 'Husky' }
];
let selectedDog = 0;

function setDog(idx, el) {
    selectedDog = idx;
    document.querySelectorAll('.color-opt').forEach(opt => opt.classList.remove('active-opt'));
    if(el) el.classList.add('active-opt');
}

// Game Constants
const GRAVITY = 0.5;
const JUMP = -10;
const SPEED = 3.2;

const LEVELS = [
  {
    bg: '#2c3e50',
    platforms: [{x:0, y:288, w:480, h:32}, {x:100, y:220, w:100, h:15}, {x:280, y:180, w:100, h:15}, {x:50, y:140, w:80, h:15}],
    bones: [{x:120, y:200}, {x:300, y:160}, {x:70, y:120}, {x:400, y:260}, {x:200, y:260}],
    steaks: [{x:330, y:260}],
    vacuums: [{x:250, y:260, range: 100, speed: 1.5, dir: 1}],
    bed: {x:420, y:288},
    goal: 5
  },
  {
    bg: '#1a1a2e',
    platforms: [{x:0, y:288, w:150, h:32}, {x:200, y:240, w:100, h:15}, {x:350, y:288, w:130, h:32}, {x:100, y:160, w:80, h:15}, {x:250, y:120, w:100, h:15}],
    bones: [{x:30, y:260}, {x:220, y:220}, {x:380, y:260}, {x:120, y:140}, {x:270, y:100}, {x:440, y:260}],
    steaks: [{x:400, y:180}],
    vacuums: [{x:80, y:250, range: 50, speed: 2, dir: 1}, {x:380, y:250, range: 40, speed: 2, dir: -1}],
    bed: {x:420, y:288},
    goal: 6
  }
];

let curLvl = 0, score = 0, lives = 3, gameActive = false, power = 0, barkTimer = 0;
let player = { x:30, y:200, vx:0, vy:0, ground:false, dir:1 };
let vacs = [], bones = [], steaks = [];

function init(lvlIdx) {
    const L = LEVELS[lvlIdx];
    score = 0; power = 0; barkTimer = 0;
    player = { x:30, y:200, vx:0, vy:0, ground:false, dir:1 };
    bones = L.bones.map(b => ({...b, collected:false}));
    steaks = L.steaks.map(s => ({...s, collected:false}));
    vacs = L.vacuums.map(v => ({...v, startX:v.x}));
    updateUI();
}

function updateUI() {
    document.getElementById('hearts-ui').textContent = `🦴 ${score}/${LEVELS[curLvl].goal}`;
    document.getElementById('level-ui').textContent = `LEVEL ${curLvl + 1}`;
    document.getElementById('lives-ui').textContent = `LIVES: ${lives}`;
}

function drawDog(x, y, dir, pwr) {
    const c = DOG_PALETTES[selectedDog];
    ctx.save();
    ctx.translate(x, y);
    if(dir < 0) { ctx.translate(24, 0); ctx.scale(-1, 1); }
    if(pwr > 0) { ctx.shadowBlur = 15; ctx.shadowColor = 'red'; }
    ctx.fillStyle = c.main;
    ctx.fillRect(0, 10, 20, 12); 
    ctx.fillRect(14, 3, 10, 10); 
    ctx.fillStyle = c.spot;
    ctx.fillRect(14, 1, 4, 6); 
    ctx.fillStyle = c.main;
    ctx.fillRect(2, 22, 4, 4); ctx.fillRect(16, 22, 4, 4); 
    ctx.fillRect(-3, 8, 4, 4); 
    ctx.fillStyle = '#000';
    ctx.fillRect(22, 5, 3, 3); 
    
    if(barkTimer > 0) {
        ctx.fillStyle = "white";
        ctx.font = "8px 'Press Start 2P'";
        ctx.fillText("BARK!", 0, -5);
        barkTimer--;
    }
    ctx.restore();
}

function drawVacuum(v) {
    ctx.fillStyle = '#555';
    ctx.fillRect(v.x - 15, v.y + 5, 30, 15);
    ctx.fillStyle = '#333';
    ctx.fillRect(v.x - 2, v.y - 10, 4, 15);
    ctx.fillStyle = '#ff0000';
    if(Math.floor(Date.now()/200) % 2) ctx.fillRect(v.x + 8, v.y + 7, 4, 4);
}

function drawBone(x, y) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(x-6, y-2, 12, 4);
    ctx.fillRect(x-8, y-4, 4, 4); ctx.fillRect(x-8, y+0, 4, 4);
    ctx.fillRect(x+4, y-4, 4, 4); ctx.fillRect(x+4, y+0, 4, 4);
}

function drawSteak(x, y) {
    ctx.fillStyle = '#a22';
    ctx.fillRect(x-10, y-6, 20, 12);
    ctx.fillStyle = '#fff';
    ctx.fillRect(x+2, y-2, 4, 4);
}

function drawBed(x, y) {
    ctx.fillStyle = '#4a90d9';
    ctx.beginPath(); ctx.ellipse(x, y+10, 30, 10, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffdbac';
    ctx.fillRect(x-5, y-10, 10, 10); 
    ctx.fillStyle = '#333';
    ctx.fillRect(x-5, y-12, 10, 4); 
}

function update() {
    if(!gameActive) return;
    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;
    player.ground = false;

    const L = LEVELS[curLvl];
    L.platforms.forEach(p => {
        if(player.x+20 > p.x && player.x < p.x+p.w && player.y+26 > p.y && player.y+26 < p.y+p.h) {
            if(player.vy > 0) { player.y = p.y - 26; player.vy = 0; player.ground = true; }
        }
    });

    if(player.x < 0) player.x = 0;
    if(player.x > W-24) player.x = W-24;
    if(player.y > H) die();

    bones.forEach(b => {
        if(!b.collected && Math.hypot(player.x-b.x, player.y-b.y) < 25) { b.collected = true; score++; updateUI(); }
    });

    steaks.forEach(s => {
        if(!s.collected && Math.hypot(player.x-s.x, player.y-s.y) < 25) { s.collected = true; power = 300; }
    });

    if(power > 0) power--;

    vacs.forEach(v => {
        v.x += v.dir * v.speed;
        if(Math.abs(v.x - v.startX) > v.range) v.dir *= -1;
        if(power <= 0 && Math.hypot(player.x+10-v.x, player.y+10-v.y) < 20) die();
    });

    if(score >= L.goal && Math.hypot(player.x - L.bed.x, player.y - L.bed.y) < 40) win();
}

function die() {
    lives--;
    updateUI();
    if(lives <= 0) {
        showOverlay("GAME OVER", "The vacuum won this time!", "RESTART", () => { lives=3; curLvl=0; init(0); });
    } else {
        init(curLvl);
    }
}

function win() {
    if(curLvl < LEVELS.length - 1) {
        showOverlay("LEVEL CLEAR!", "Back to the bed!", "NEXT LEVEL", () => { curLvl++; init(curLvl); });
    } else {
        showOverlay("CHAMPION!", "You are the best dog!", "REPLAY", () => { curLvl=0; lives=3; init(0); });
    }
}

function draw() {
    ctx.fillStyle = LEVELS[curLvl].bg;
    ctx.fillRect(0,0,W,H);
    LEVELS[curLvl].platforms.forEach(p => {
        ctx.fillStyle = '#444'; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = '#666'; ctx.fillRect(p.x, p.y, p.w, 4);
    });
    drawBed(LEVELS[curLvl].bed.x, LEVELS[curLvl].bed.y);
    bones.forEach(b => { if(!b.collected) drawBone(b.x, b.y); });
    steaks.forEach(s => { if(!s.collected) drawSteak(s.x, s.y); });
    vacs.forEach(drawVacuum);
    drawDog(player.x, player.y, player.dir, power);
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

function showOverlay(t, m, b, cb) {
    gameActive = false;
    const ov = document.getElementById('overlay');
    ov.style.display = 'flex';
    document.getElementById('ov-title').textContent = t;
    document.getElementById('ov-msg').textContent = m;
    const btn = document.getElementById('start-btn');
    btn.textContent = b;
    btn.onclick = (e) => {
        e.stopPropagation();
        ov.style.display = 'none';
        if(cb) cb(); else init(curLvl);
        gameActive = true; 
    };
}

// Controls
window.onkeydown = e => { 
    if(e.code === 'ArrowLeft') { player.vx = -SPEED; player.dir = -1; }
    if(e.code === 'ArrowRight') { player.vx = SPEED; player.dir = 1; }
    if((e.code === 'ArrowUp' || e.code === 'Space') && player.ground) { player.vy = JUMP; barkTimer = 20; }
};
window.onkeyup = e => { 
    if(e.code === 'ArrowLeft' || e.code === 'ArrowRight') player.vx = 0;
};

// On-screen Button Mapping
const setupBtn = (id, action) => {
    const b = document.getElementById(id);
    const start = (e) => {
        e.preventDefault();
        if(action === 'left') { player.vx = -SPEED; player.dir = -1; }
        if(action === 'right') { player.vx = SPEED; player.dir = 1; }
        if(action === 'jump' && player.ground) { player.vy = JUMP; barkTimer = 20; }
    };
    const end = (e) => { e.preventDefault(); if(action !== 'jump') player.vx = 0; };
    b.addEventListener('touchstart', start);
    b.addEventListener('mousedown', start);
    b.addEventListener('touchend', end);
    b.addEventListener('mouseup', end);
};
setupBtn('btn-left', 'left');
setupBtn('btn-right', 'right');
setupBtn('btn-jump', 'jump');

// Initial Call
setDog(0, document.querySelector('.color-opt'));
showOverlay("🐾 Good Dog! 🐾", "Collect bones and avoid vacuums to get to your human!", "START PLAYING");
loop();
</script>

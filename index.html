<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Good Dog Adventure! 🐾</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Press Start 2P', monospace;
  overflow: hidden;
  user-select: none;
}
#ui {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 480px;
  max-width: 95vw;
  padding: 8px 4px;
}
#ui span { color: #fff; font-size: 7px; text-shadow: 0 0 5px #000; }
#hearts-ui { color: #ffd700 !important; }

canvas {
  display: block;
  border: 4px solid #4a90d9;
  background: #222;
  image-rendering: pixelated;
  touch-action: none;
  max-width: 95vw;
}
#controls { display: flex; gap: 12px; margin-top: 12px; z-index: 2; }
.btn {
  background: #333;
  border: 2px solid #4a90d9;
  color: white;
  padding: 15px 25px;
  border-radius: 8px;
  font-family: 'Press Start 2P';
  cursor: pointer;
}
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  text-align: center;
  padding: 20px;
}
#overlay h1 { color: #4a90d9; font-size: 18px; margin-bottom: 15px; }
#overlay p { color: #ccc; font-size: 9px; line-height: 1.6; margin-bottom: 20px; white-space: pre-line; }
.color-select { display: flex; gap: 10px; margin-bottom: 20px; }
.color-opt { 
    width: 40px; height: 40px; border: 3px solid #fff; cursor: pointer; border-radius: 5px;
}
.active-opt { border-color: #4a90d9; transform: scale(1.1); }
#start-btn {
  background: #4a90d9; border: none; color: white;
  padding: 15px 30px; font-family: 'Press Start 2P'; cursor: pointer;
}
#power-indicator { color: #ff4d4d; font-size: 8px; margin-top: 5px; height: 10px;}
</style>
</head>
<body>

<div id="ui">
  <span id="level-ui">LEVEL 1</span>
  <span id="hearts-ui">🦴 0/5</span>
  <span id="lives-ui">LIVES: 3</span>
</div>

<canvas id="game" width="480" height="320"></canvas>
<div id="power-indicator"></div>

<div id="controls">
  <button class="btn" id="btn-left">◀</button>
  <button class="btn" id="btn-jump">▲</button>
  <button class="btn" id="btn-right">▶</button>
</div>

<div id="overlay">
  <h1 id="ov-title">🐾 Good Dog! 🐾</h1>
  <p id="ov-msg">The scary Vacuums are awake! 
    Collect Bones 🦴 and Steaks 🥩 
    to reach the Dog Bed!</p>
  
  <div class="color-select">
    <div class="color-opt active-opt" data-idx="0" style="background:#edc9af"></div>
    <div class="color-opt" data-idx="1" style="background:#333"></div>
    <div class="color-opt" data-idx="2" style="background:#ddd"></div>
  </div>

  <button id="start-btn">START PLAYING</button>
</div>

<script>
window.onload = function() {
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = 480, H = 320;

    const DOG_PALETTES = [
        { main: '#edc9af', spot: '#d2b48c' },
        { main: '#333333', spot: '#000000' },
        { main: '#dddddd', spot: '#4a90d9' }
    ];
    let selectedDog = 0;
    let gameActive = false;
    let curLvl = 0, score = 0, lives = 3, power = 0, barkTimer = 0;
    let player = { x:30, y:200, vx:0, vy:0, ground:false, dir:1 };
    let vacs = [], bones = [], steaks = [];

    const LEVELS = [
      {
        bg: '#2c3e50',
        platforms: [{x:0, y:288, w:480, h:32}, {x:100, y:220, w:100, h:15}, {x:280, y:180, w:100, h:15}, {x:50, y:140, w:80, h:15}],
        bones: [{x:120, y:200}, {x:300, y:160}, {x:70, y:120}, {x:400, y:260}, {x:200, y:260}],
        steaks: [{x:330, y:260}],
        vacuums: [{x:250, y:260, range: 100, speed: 1.5, dir: 1}],
        bed: {x:420, y:288},
        goal: 5
      },
      {
        bg: '#1a1a2e',
        platforms: [{x:0, y:288, w:150, h:32}, {x:200, y:240, w:100, h:15}, {x:350, y:288, w:130, h:32}, {x:100, y:160, w:80, h:15}, {x:250, y:120, w:100, h:15}],
        bones: [{x:30, y:260}, {x:220, y:220}, {x:380, y:260}, {x:120, y:140}, {x:270, y:100}, {x:440, y:260}],
        steaks: [{x:400, y:180}],
        vacuums: [{x:80, y:250, range: 50, speed: 2, dir: 1}, {x:380, y:250, range: 40, speed: 2, dir: -1}],
        bed: {x:420, y:288},
        goal: 6
      }
    ];

    function init(lvlIdx) {
        const L = LEVELS[lvlIdx];
        score = 0; power = 0; barkTimer = 0;
        player = { x:30, y:200, vx:0, vy:0, ground:false, dir:1 };
        bones = L.bones.map(b => ({...b, collected:false}));
        steaks = L.steaks.map(s => ({...s, collected:false}));
        vacs = L.vacuums.map(v => ({...v, startX:v.x}));
        updateUI();
    }

    function updateUI() {
        document.getElementById('hearts-ui').textContent = `🦴 ${score}/${LEVELS[curLvl].goal}`;
        document.getElementById('level-ui').textContent = `LEVEL ${curLvl + 1}`;
        document.getElementById('lives-ui').textContent = `LIVES: ${lives}`;
    }

    function drawDog(x, y, dir, pwr) {
        const c = DOG_PALETTES[selectedDog];
        ctx.save();
        ctx.translate(x, y);
        if(dir < 0) { ctx.translate(24, 0); ctx.scale(-1, 1); }
        if(pwr > 0) { ctx.shadowBlur = 15; ctx.shadowColor = 'red'; }
        ctx.fillStyle = c.main;
        ctx.fillRect(0, 10, 20, 12); 
        ctx.fillRect(14, 3, 10, 10); 
        ctx.fillStyle = c.spot;
        ctx.fillRect(14, 1, 4, 6); 
        ctx.fillStyle = c.main;
        ctx.fillRect(2, 22, 4, 4); ctx.fillRect(16, 22, 4, 4); 
        ctx.fillRect(-3, 8, 4, 4); 
        ctx.fillStyle = '#000';
        ctx.fillRect(22, 5, 3, 3); 
        if(barkTimer > 0) {
            ctx.fillStyle = "white";
            ctx.font = "8px 'Press Start 2P'";
            ctx.fillText("BARK!", 0, -5);
            barkTimer--;
        }
        ctx.restore();
    }

    function drawVacuum(v) {
        ctx.fillStyle = '#555';
        ctx.fillRect(v.x - 15, v.y + 5, 30, 15);
        ctx.fillStyle = '#ff0000';
        if(Math.floor(Date.now()/200) % 2) ctx.fillRect(v.x + 8, v.y + 7, 4, 4);
    }

    function drawBone(x, y) {
        ctx.fillStyle = '#fff'; ctx.fillRect(x-6, y-2, 12, 4);
        ctx.fillRect(x-8, y-4, 4, 4); ctx.fillRect(x-8, y+0, 4, 4);
        ctx.fillRect(x+4, y-4, 4, 4); ctx.fillRect(x+4, y+0, 4, 4);
    }

    function drawSteak(x, y) {
        ctx.fillStyle = '#a22'; ctx.fillRect(x-10, y-6, 20, 12);
        ctx.fillStyle = '#fff'; ctx.fillRect(x+2, y-2, 4, 4);
    }

    function drawBed(x, y) {
        ctx.fillStyle = '#4a90d9';
        ctx.beginPath(); ctx.ellipse(x, y+10, 30, 10, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffdbac'; ctx.fillRect(x-5, y-10, 10, 10);
        ctx.fillStyle = '#333'; ctx.fillRect(x-5, y-12, 10, 4);
    }

    function update() {
        if(!gameActive) return;
        player.vy += 0.5;
        player.x += player.vx;
        player.y += player.vy;
        player.ground = false;

        const L = LEVELS[curLvl];
        L.platforms.forEach(p => {
            if(player.x+20 > p.x && player.x < p.x+p.w && player.y+26 > p.y && player.y+26 < p.y+p.h) {
                if(player.vy > 0) { player.y = p.y - 26; player.vy = 0; player.ground = true; }
            }
        });

        if(player.x < 0) player.x = 0;
        if(player.x > W-24) player.x = W-24;
        if(player.y > H) { lives--; init(curLvl); if(lives<=0) showGameOver(); }

        bones.forEach(b => {
            if(!b.collected && Math.hypot(player.x-b.x, player.y-b.y) < 25) { b.collected = true; score++; updateUI(); }
        });

        steaks.forEach(s => {
            if(!s.collected && Math.hypot(player.x-s.x, player.y-s.y) < 25) { s.collected = true; power = 300; }
        });

        if(power > 0) power--;

        vacs.forEach(v => {
            v.x += v.dir * v.speed;
            if(Math.abs(v.x - v.startX) > v.range) v.dir *= -1;
            if(power <= 0 && Math.hypot(player.x+10-v.x, player.y+10-v.y) < 20) { lives--; init(curLvl); if(lives<=0) showGameOver(); }
        });

        if(score >= L.goal && Math.hypot(player.x - L.bed.x, player.y - L.bed.y) < 40) win();
    }

    function showGameOver() {
        gameActive = false;
        lives = 3; curLvl = 0;
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('ov-title').textContent = "GAME OVER";
        document.getElementById('ov-msg').textContent = "The vacuums got you!";
        document.getElementById('start-btn').textContent = "TRY AGAIN";
    }

    function win() {
        gameActive = false;
        if(curLvl < LEVELS.length - 1) {
            curLvl++;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('ov-title').textContent = "LEVEL CLEAR!";
            document.getElementById('ov-msg').textContent = "Found the bed!";
            document.getElementById('start-btn').textContent = "NEXT LEVEL";
        } else {
            curLvl = 0; lives = 3;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('ov-title').textContent = "WINNER!";
            document.getElementById('ov-msg').textContent = "Best dog ever!";
            document.getElementById('start-btn').textContent = "REPLAY";
        }
    }

    function loop() {
        ctx.fillStyle = LEVELS[curLvl].bg;
        ctx.fillRect(0,0,W,H);
        LEVELS[curLvl].platforms.forEach(p => {
            ctx.fillStyle = '#444'; ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = '#666'; ctx.fillRect(p.x, p.y, p.w, 4);
        });
        drawBed(LEVELS[curLvl].bed.x, LEVELS[curLvl].bed.y);
        bones.forEach(b => { if(!b.collected) drawBone(b.x, b.y); });
        steaks.forEach(s => { if(!s.collected) drawSteak(s.x, s.y); });
        vacs.forEach(drawVacuum);
        drawDog(player.x, player.y, player.dir, power);
        update();
        requestAnimationFrame(loop);
    }

    // BUTTON LISTENERS
    document.getElementById('start-btn').addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById('overlay').style.display = 'none';
        init(curLvl);
        gameActive = true;
    });

    document.querySelectorAll('.color-opt').forEach(opt => {
        opt.addEventListener('click', function() {
            document.querySelectorAll('.color-opt').forEach(o => o.classList.remove('active-opt'));
            this.classList.add('active-opt');
            selectedDog = parseInt(this.getAttribute('data-idx'));
        });
    });

    // CONTROLS
    const setMove = (dir) => { 
        if(dir === 0) player.vx = 0;
        else { player.vx = dir * 3.2; player.dir = dir; }
    };
    
    document.getElementById('btn-left').addEventListener('mousedown', () => setMove(-1));
    document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); setMove(-1); });
    document.getElementById('btn-right').addEventListener('mousedown', () => setMove(1));
    document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); setMove(1); });
    document.getElementById('btn-jump').addEventListener('mousedown', () => { if(player.ground) { player.vy = -10; barkTimer = 20; } });
    document.getElementById('btn-jump').addEventListener('touchstart', (e) => { e.preventDefault(); if(player.ground) { player.vy = -10; barkTimer = 20; } });
    
    window.addEventListener('mouseup', () => setMove(0));
    window.addEventListener('touchend', () => setMove(0));
    
    window.addEventListener('keydown', e => {
        if(e.code === 'ArrowLeft') setMove(-1);
        if(e.code === 'ArrowRight') setMove(1);
        if((e.code === 'ArrowUp' || e.code === 'Space') && player.ground) { player.vy = -10; barkTimer = 20; }
    });
    window.addEventListener('keyup', e => { if(e.code === 'ArrowLeft' || e.code === 'ArrowRight') setMove(0); });

    loop();
};
</script>
</body>
</html>

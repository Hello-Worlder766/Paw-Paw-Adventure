<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Good Dog Adventure! 🐾</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Press Start 2P', monospace;
  overflow: hidden;
  user-select: none;
}
#ui {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 480px;
  max-width: 95vw;
  padding: 8px 4px;
}
#ui span { color: #fff; font-size: 7px; text-shadow: 0 0 5px #000; }
#hearts-ui { color: #ffd700 !important; } /* Bone color */

canvas {
  display: block;
  border: 4px solid #4a90d9;
  background: #222;
  image-rendering: pixelated;
  touch-action: none;
  max-width: 95vw;
}
#controls { display: flex; gap: 12px; margin-top: 12px; z-index: 2; }
.btn {
  background: #333;
  border: 2px solid #4a90d9;
  color: white;
  padding: 15px 25px;
  border-radius: 8px;
  font-family: 'Press Start 2P';
}
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  text-align: center;
  padding: 20px;
}
#overlay h1 { color: #4a90d9; font-size: 18px; margin-bottom: 15px; }
#overlay p { color: #ccc; font-size: 9px; line-height: 1.6; margin-bottom: 20px; white-space: pre-line; }
.color-select { display: flex; gap: 10px; margin-bottom: 20px; }
.color-opt { 
    width: 40px; height: 40px; border: 3px solid #fff; cursor: pointer; border-radius: 5px;
}
.active-opt { border-color: #4a90d9; transform: scale(1.1); }
#start-btn {
  background: #4a90d9; border: none; color: white;
  padding: 15px 30px; font-family: 'Press Start 2P'; cursor: pointer;
}
#power-indicator { color: #ff4d4d; font-size: 8px; margin-top: 5px; height: 10px;}
</style>
</head>
<body>

<div id="ui">
  <span id="level-ui">LEVEL 1</span>
  <span id="hearts-ui">🦴 0/5</span>
  <span id="lives-ui">LIVES: 3</span>
</div>

<canvas id="game" width="480" height="320"></canvas>
<div id="power-indicator"></div>

<div id="controls">
  <button class="btn" id="btn-left">◀</button>
  <button class="btn" id="btn-jump">▲</button>
  <button class="btn" id="btn-right">▶</button>
</div>

<div id="overlay">
  <h1 id="ov-title">🐾 Good Dog! 🐾</h1>
  <p id="ov-msg">The scary Vacuums are awake! 
    Collect all the Bones 🦴 and Steaks 🥩 
    to reach your Human at the Dog Bed!</p>
  
  <div class="color-select" id="selector">
    <div class="color-opt" style="background:#edc9af" onclick="setDog(0, this)"></div>
    <div class="color-opt" style="background:#333" onclick="setDog(1, this)"></div>
    <div class="color-opt" style="background:#ddd" onclick="setDog(2, this)"></div>
  </div>

  <button id="start-btn">START PLAYING</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 480, H = 320;

// Dog Colors
const DOG_PALETTES = [
    { main: '#edc9af', spot: '#d2b48c', name: 'Golden' },
    { main: '#333333', spot: '#000000', name: 'Black' },
    { main: '#dddddd', spot: '#4a90d9', name: 'Husky' }
];
let selectedDog = 0;

function setDog(idx, el) {
    selectedDog = idx;
    document.querySelectorAll('.color-opt').forEach(opt => opt.classList.remove('active-opt'));
    el.classList.add('active-opt');
}
setDog(0, document.querySelectorAll('.color-opt')[0]);

// Game Constants
const GRAVITY = 0.5;
const JUMP = -10;
const SPEED = 3.2;

const LEVELS = [
  {
    bg: '#2c3e50',
    platforms: [{x:0, y:288, w:480, h:32}, {x:100, y:220, w:100, h:15}, {x:280, y:180, w:100, h:15}, {x:50, y:140, w:80, h:15}],
    bones: [{x:120, y:200}, {x:300, y:160}, {x:70, y:120}, {x:400, y:260}, {x:200, y:260}],
    steaks: [{x:330, y:260}],
    vacuums: [{x:250, y:260, range: 100, speed: 1.5}],
    bed: {x:400, y:288},
    goal: 5
  },
  {
    bg: '#1a1a2e',
    platforms: [{x:0, y:288, w:150, h:32}, {x:200, y:240, w:100, h:15}, {x:350, y:288, w:130, h:32}, {x:100, y:160, w:80, h:15}, {x:250, y:120, w:100, h:15}],
    bones: [{x:30, y:260}, {x:220, y:220}, {x:380, y:260}, {x:120, y:140}, {x:270, y:100}, {x:440, y:260}],
    steaks: [{x:400, y:180}],
    vacuums: [{x:80, y:250, range: 50, speed: 2}, {x:380, y:250, range: 40, speed: 2}],
    bed: {x:420, y:288},
    goal: 6
  }
];

let curLvl = 0, score = 0, lives = 3, gameActive = false, power = 0, player = {}, vacs = [], bones = [], steaks = [], parts = [];

function init(lvlIdx) {
    const L = LEVELS[lvlIdx];
    score = 0; power = 0;
    player = { x:30, y:200, vx:0, vy:0, ground:false, dir:1, dead:false };
    bones = L.bones.map(b => ({...b, collected:false}));
    steaks = L.steaks.map(s => ({...s, collected:false}));
    vacs = L.vacuums.map(v => ({...v, startX:v.x, phase:0}));
    updateUI();
}

function updateUI() {
    document.getElementById('hearts-ui').textContent = `🦴 ${score}/${LEVELS[curLvl].goal}`;
    document.getElementById('level-ui').textContent = `LEVEL ${curLvl + 1}`;
    document.getElementById('lives-ui').textContent = `LIVES: ${lives}`;
}

// Drawing Functions
function drawDog(x, y, dir, pwr) {
    const c = DOG_PALETTES[selectedDog];
    ctx.save();
    ctx.translate(x + 12, y + 15);
    if(dir < 0) ctx.scale(-1, 1);
    
    if(pwr > 0) { ctx.shadowBlur = 15; ctx.shadowColor = 'red'; }

    // Body
    ctx.fillStyle = c.main;
    ctx.fillRect(-12, -5, 20, 12);
    // Head
    ctx.fillRect(2, -12, 10, 10);
    // Ears
    ctx.fillStyle = c.spot;
    ctx.fillRect(2, -14, 4, 6);
    // Legs
    ctx.fillStyle = c.main;
    ctx.fillRect(-10, 7, 4, 4);
    ctx.fillRect(4, 7, 4, 4);
    // Tail
    ctx.fillRect(-15, -7, 4, 4);
    // Nose
    ctx.fillStyle = '#000';
    ctx.fillRect(10, -10, 3, 3);
    
    ctx.restore();
}

function drawVacuum(v) {
    ctx.save();
    ctx.translate(v.x, v.y);
    ctx.fillStyle = '#555';
    ctx.fillRect(-15, -10, 30, 15); // Base
    ctx.fillStyle = '#333';
    ctx.fillRect(-2, -25, 4, 15); // Handle
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(8 * (Math.sin(Date.now()/100) > 0 ? 1 : -1), -8, 4, 4); // Eye/Light
    ctx.restore();
}

function drawBone(x, y) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(x-6, y-2, 12, 4);
    ctx.fillRect(x-8, y-4, 4, 4); ctx.fillRect(x-8, y+0, 4, 4);
    ctx.fillRect(x+4, y-4, 4, 4); ctx.fillRect(x+4, y+0, 4, 4);
}

function drawSteak(x, y) {
    ctx.fillStyle = '#a22';
    ctx.fillRect(x-10, y-6, 20, 12);
    ctx.fillStyle = '#fff';
    ctx.fillRect(x+2, y-2, 4, 4); // Bone in steak
}

function drawBed(x, y) {
    // The Dog Bed
    ctx.fillStyle = '#4a90d9';
    ctx.beginPath();
    ctx.ellipse(x, y, 30, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2c3e50';
    ctx.beginPath();
    ctx.ellipse(x, y, 20, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    // The Human (Generic Head)
    ctx.fillStyle = '#ffdbac';
    ctx.fillRect(x-5, y-20, 10, 10);
    ctx.fillStyle = '#333';
    ctx.fillRect(x-5, y-22, 10, 4); // Hair
}

function update() {
    if(!gameActive) return;
    
    // Physics
    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;
    player.ground = false;

    const L = LEVELS[curLvl];

    // Collisions
    L.platforms.forEach(p => {
        if(player.x+20 > p.x && player.x < p.x+p.w && player.y+20 > p.y && player.y+20 < p.y+p.h) {
            if(player.vy > 0) {
                player.y = p.y - 20;
                player.vy = 0;
                player.ground = true;
            }
        }
    });

    // Bounds
    if(player.x < 0) player.x = 0;
    if(player.x > W-20) player.x = W-20;
    if(player.y > H) die();

    // Collectibles
    bones.forEach(b => {
        if(!b.collected && Math.hypot(player.x-b.x, player.y-b.y) < 20) {
            b.collected = true; score++; updateUI();
        }
    });

    steaks.forEach(s => {
        if(!s.collected && Math.hypot(player.x-s.x, player.y-s.y) < 20) {
            s.collected = true; power = 300; updateUI();
        }
    });

    if(power > 0) {
        power--;
        document.getElementById('power-indicator').textContent = "STEAK POWER! VACUUMS CAN'T HURT YOU!";
    } else {
        document.getElementById('power-indicator').textContent = "";
    }

    // Enemies
    vacs.forEach(v => {
        v.x += (v.dir || 1) * v.speed;
        if(Math.abs(v.x - v.startX) > v.range) v.dir = (v.dir || 1) * -1;
        
        if(power <= 0 && Math.hypot(player.x+10-v.x, player.y+10-v.y) < 20) die();
    });

    // Win condition (at Bed)
    if(score >= L.goal && Math.hypot(player.x - L.bed.x, player.y - L.bed.y) < 30) {
        win();
    }
}

function die() {
    lives--;
    if(lives <= 0) {
        showOverlay("GAME OVER", "The vacuum was too scary!", "RESTART", () => { lives=3; curLvl=0; init(0); });
    } else {
        init(curLvl);
    }
}

function win() {
    gameActive = false;
    if(curLvl < LEVELS.length - 1) {
        showOverlay("GOOD DOG!", "You made it back to your human!", "NEXT LEVEL", () => { curLvl++; init(curLvl); gameActive=true; });
    } else {
        showOverlay("CHAMPION!", "You are the best dog ever.\nTime for a long nap!", "PLAY AGAIN", () => { curLvl=0; lives=3; init(0); });
    }
}

function draw() {
    ctx.fillStyle = LEVELS[curLvl].bg;
    ctx.fillRect(0,0,W,H);
    
    LEVELS[curLvl].platforms.forEach(p => {
        ctx.fillStyle = '#444'; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = '#666'; ctx.fillRect(p.x, p.y, p.w, 4);
    });

    drawBed(LEVELS[curLvl].bed.x, LEVELS[curLvl].bed.y);
    bones.forEach(b => { if(!b.collected) drawBone(b.x, b.y); });
    steaks.forEach(s => { if(!s.collected) drawSteak(s.x, s.y); });
    vacs.forEach(drawVacuum);
    drawDog(player.x, player.y, player.dir, power);
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

function showOverlay(t, m, b, cb) {
    gameActive = false;
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('ov-title').textContent = t;
    document.getElementById('ov-msg').textContent = m;
    const btn = document.getElementById('start-btn');
    btn.textContent = b;
    btn.onclick = () => { document.getElementById('overlay').style.display='none'; gameActive=true; cb(); };
}

// Controls
const keys = {};
window.onkeydown = e => { 
    keys[e.code] = true; 
    if(e.code === 'ArrowLeft') { player.vx = -SPEED; player.dir = -1; }
    if(e.code === 'ArrowRight') { player.vx = SPEED; player.dir = 1; }
    if((e.code === 'ArrowUp' || e.code === 'Space') && player.ground) player.vy = JUMP;
};
window.onkeyup = e => { 
    keys[e.code] = false; 
    if(!keys['ArrowLeft'] && !keys['ArrowRight']) player.vx = 0;
};

// Touch
const hold = (id, f) => {
    const el = document.getElementById(id);
    el.ontouchstart = e => { e.preventDefault(); f(true); };
    el.ontouchend = () => f(false);
};
hold('btn-left', v => { player.vx = v ? -SPEED : 0; if(v) player.dir = -1; });
hold('btn-right', v => { player.vx = v ? SPEED : 0; if(v) player.dir = 1; });
hold('btn-jump', v => { if(v && player.ground) player.vy = JUMP; });

init(0);
loop();
</script>
</body>
</html>
